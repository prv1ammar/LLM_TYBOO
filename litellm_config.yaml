model_list:
  # ── Qwen2.5-3B (CPU "Complex" Model - Fast & Reliable) ──────────────────────
  - model_name: internal-llm-14b
    litellm_params:
      model: openai/local
      api_base: http://llm-14b:8000/v1
      api_key: local

  # ── Qwen2.5-0.5B (CPU "Fast" Model - Ultra-lightweight) ─────────────────────
  - model_name: internal-llm-3b
    litellm_params:
      model: openai/local
      api_base: http://llm-3b:8001/v1
      api_key: local

  # ── Default Alias (14B) ─────────────────────────────────────────────────────
  - model_name: internal-llm
    litellm_params:
      model: openai/local
      api_base: http://llm-14b:8000/v1
      api_key: local

  # ── Embedding Model (BGE-M3) ────────────────────────────────────────────────
  - model_name: internal-embedding
    litellm_params:
      model: openai/bge-m3
      api_base: http://api:8888/v1
      api_key: local

litellm_settings:
  drop_params: True
  set_verbose: True
