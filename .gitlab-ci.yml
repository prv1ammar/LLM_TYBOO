

#docker compose run --rm model-downloader run this in vm before anything else to download the models



stages:
  - build
  - deploy
variables:

  API_IMAGE: "${CI_REGISTRY_IMAGE}:api-${CI_COMMIT_SHORT_SHA}"
  DASHBOARD_IMAGE: "${CI_REGISTRY_IMAGE}:dashboard-${CI_COMMIT_SHORT_SHA}"

build:
  stage: build
  image: docker:24.0.0-dind
  services:
    - docker:24.0.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: ""
  tags:
    - litellm-tybo
  before_script:
      - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker compose build api dashboard
    - docker compose push api dashboard


deploy_to_vm:
  stage: deploy
  image: docker:24.0.0-dind
  services:
    - docker:24.0.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: ""
  tags:
    - litellm-tybo
  needs:
    - build
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - cd /home/tythonai/litellm-tybo
    - docker compose pull api dashboard
    - docker compose up -d llm-14b llm-3b qdrant postgres litellm n8n prometheus grafana
    - docker compose up -d api dashboard