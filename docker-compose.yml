networks:
  llm-network:
    driver: bridge

volumes:
  qdrant_data:
  postgres_data:
  n8n_data:


services:

  # ── 1a. llm-14b — Qwen2.5-14B Q4_K_M ───────────────────────────────────
  #  RAM: ~9GB | Threads: 7 | Port: 8000
  #  Utilisé pour: RAG, analyse documents, code, tâches complexes
  llm-14b:
    image: ghcr.io/abetlen/llama-cpp-python:latest
    container_name: llm-14b
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /home/tythonai/models:/models
    environment:
      - MODEL=/models/qwen2.5-14b-instruct-q4_k_m.gguf
      - HOST=0.0.0.0
      - PORT=8000
      - N_THREADS=7
      - N_CTX=8192
      - N_BATCH=512
      - CHAT_FORMAT=chatml
    networks:
      - llm-network
    healthcheck:
      test: [ "NONE" ]

  # ── 1b. llm-3b — Qwen2.5-3B Q4_K_M ─────────────────────────────────────
  #  RAM: ~2GB | Threads: 3 | Port: 8001
  #  Utilisé pour: chat simple, Q&A rapide, résumés courts
  llm-3b:
    image: ghcr.io/abetlen/llama-cpp-python:latest
    container_name: llm-3b
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - /home/tythonai/models:/models
    environment:
      - MODEL=/models/qwen2.5-3b-instruct-q4_k_m.gguf
      - HOST=0.0.0.0
      - PORT=8001
      - N_THREADS=3
      - N_CTX=4096
      - N_BATCH=256
      - CHAT_FORMAT=chatml
    networks:
      - llm-network
    healthcheck:
      test: [ "NONE" ]
    # ── 2. Téléchargement modèles GGUF (1 seule fois) ────────────────────────
    #  14B Q4: ~8.7GB | 3B Q4: ~2GB | Total: ~10.7GB storage
