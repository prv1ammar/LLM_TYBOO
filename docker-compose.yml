version: "3.9"

services:

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: raven_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ravenpass --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ravenpass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RAVEN API ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raven_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=ravenpass
      - LOG_DIR=/app/logs
      - INTENT_MODEL=models/raven_cnn.pkl
      - LLM_MODEL=Qwen/Qwen2.5-0.5B-Instruct
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  hf_cache:
