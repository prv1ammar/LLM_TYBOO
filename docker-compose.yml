    #          echo '⏳ Downloading Qwen2.5-3B Q4_K_M (~2GB)...';
    #          curl -fL --retry 5 -o /models/qwen2.5-3b-instruct-q4_k_m.gguf https://huggingface.co/Qwen/Qwen2.5-3B-Instruct-GGUF/resolve/main/qwen2.5-3b-instruct-q4_k_m.gguf;
    #          echo '✅ 3B downloaded.';
