    # ── 3. Qdrant — Vector DB ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - llm-network
    healthcheck:
      test: [ "NONE" ]

  # ── 4. PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: litellm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - llm-network

  # ── 5. LiteLLM — Proxy OpenAI-Compatible ─────────────────────────────────
  #  ⭐ C'est CE endpoint que n8n / LangChain / LiteLLM node utilisent
  litellm:
    image: ghcr.io/berriai/litellm:v1.80.10.rc.4
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    environment:
      - DATABASE_URL=postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm_db
      - LITELLM_MASTER_KEY=${LITELLM_KEY}
    networks:
      - llm-network

  # ── 6. API FastAPI ────────────────────────────────────────────────────────
  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: registry.tybotflow.com:443/root/litellm-tybo:api-v1
    container_name: api
    restart: unless-stopped
    ports:
      - "8888:8888"
    env_file:
      - .env
    volumes:
      - ./src:/app
    networks:
      - llm-network

  # ── 7. Dashboard Streamlit ────────────────────────────────────────────────
  dashboard:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: registry.tybotflow.com:443/root/litellm-tybo:dashboard-v1
    container_name: dashboard
    restart: unless-stopped
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./src:/app
    networks:
      - llm-network

  # ── 8. n8n ────────────────────────────────────────────────────────────────
  #  Accès   : http://YOUR_SERVER_IP:5678
  #  Dans n8n → Credentials → OpenAI-compatible :
  #    Base URL : http://litellm:4000/v1
  #    API Key  : sk-tyboo-2025
  #    Model    : internal-llm
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${SERVER_IP}:5678
      - GENERIC_TIMEZONE=Africa/Casablanca
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - OPENAI_API_KEY=${LITELLM_KEY}
      - OPENAI_API_BASE=http://litellm:4000/v1
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - llm-network

  # ── 9. Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - llm-network

  # ── 10. Grafana ───────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    networks:
      - llm-network
